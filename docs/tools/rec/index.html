<script type="text/javascript">

$(() => {
    let svg = new SVG2("#Mouse", {scale: 24, grid: 0, margin: 2, lrbt: [0, 1.8, -3.4, 0]});
    let t = 17;
    let g = svg.group().config({theta: t});
    let pt = vec2d(3, -90 - t);
    pt = [pt, [-0.2, 0.2 + pt[1]], [-0.2, pt[1] - 0.5]];
    g.poly([[0, 0], ...pt, ...fn_eval(p => [-p[0], p[1]], pt.toReversed())], 1);
});

</script>

<main>
    <nav id="Icons"></nav>
    <article></article>
</main>
<svg id="Mouse"></svg>
</body>
