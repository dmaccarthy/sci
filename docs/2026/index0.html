<style type="text/css">

:root {
    --pad: 0px;

body {

    font-weight: bold;

    display: flex;
    flex-wrap: wrap;

    /* margin-bottom: 1em; */

    background: none;
    border: none;
    border-radius: 0.5em;

<script type="text/javascript">

function onresize() {
    clearTimeout(onresize.timer);
    let win = $(window);
    let b = $("body");
    let w = b.width();
    let x = (win.width() - w) / 2;
    let nav = $("nav").css({width: `${w-12}px`, left: `${x}px`});
    let h = $(nav[0]).height() + 9;
    let nav1 = $(nav[1]).css({top: `${h}px`});
    h += nav1.height();
    b.css("margin-top", `${h+32}px`);
    document.title = $("#Title").text();
    onresize.timer = setTimeout(onresize, 1000);
}

function get_image(key) {
    let img = data_images[key];
    if (!img) {
        img = `../media/${key}`;
        if (key.indexOf(".") == -1) img += ".svg";
    }
    return img;
}

function load_images() {
    let imgs = $("[data-img]");
    for (let img of imgs) {
        img = $(img);
        let src = img.attr("data-img");
        img.removeAttr("data-img");
        if (img[0].tagName != "IMG") img = $("<img>").attr({alt: src}).appendTo(img);
        img.attr({src: get_image(src)})
    }
}

function page_info(top, info) {
    console.log(top, info);
}

function clear_page() {
    $("main").css({visibility: "hidden"}).html("");
}

function draw_page_nav(post) {
    let attr = (e, a) => {
        let r = e.attr("data-" + a);
        return r ? r : e.attr("data-id");
    }
    let div = $("<div>");
    for (let e of post) {
        e = $(e);
        let b = $("<button>").appendTo(div);
        b.html("<br/>" + attr(e, "label"));
        $("<img>").attr("data-img", attr(e, "icon")).prependTo(b);
        b.on("click", () => {
            $("main > section.Post").hide();
            e.fadeIn();
        });
    }
    $("#Page").html(div.children());
}

function load_page(id) {
    let url = `${id}.htm`;
    clear_page();
    fetch(url).then(t => t.text()).then(h => {
        let main = $("main").html(h);
        let post = main.children("section.Post").hide();
        main.css({visibility: "visible"});
        $(post[0]).fadeIn();
        url = `#${id}`;
        if (load_page.current) history.pushState({}, "", url);
        else history.replaceState({}, "", url);
        load_page.current = id;
        draw_page_nav(post);
        load_images();
        onresize();
    })
}

$(window).on("resize", onresize);

$(() => {
    load_page("p20/skill/scatter");
});

</script>
